<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NXTN Company</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F7F2EA;
      color: #333;
    }

    .lang-switch {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .lang-switch button {
      border: 1px solid rgba(80, 80, 80, 0.18);
      background: rgba(255, 255, 255, 0.35);
      color: #555;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .lang-switch button.active {
      background: #B89155;
      color: #fff;
      border-color: #B89155;
    }

    section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    .logo-hero {
      padding: 0;
      background-color: #F7F2EA;
      background-image: url("logo.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      animation: logoFadeIn 1.8s ease forwards;
    }

    .video-only {
      position: relative;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      background: #F3EEE6;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .desktop-video {
      display: block;
    }

    .mobile-video {
      display: none;
    }

    .inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 980px;
    }

    .fade-section .inner,
    .fade-section > h2,
    .fade-section > a {
      opacity: 0;
      transform: translateY(34px);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }

    .fade-section.show .inner,
    .fade-section.show > h2,
    .fade-section.show > a {
      opacity: 1;
      transform: translateY(0);
    }

    .about {
      background: #EFE7DD;
    }

    .wpc-info {
      background: #F8F6F2;
    }

    .about h2,
    .wpc-info h2,
    .contact h2 {
      margin-bottom: 28px;
      color: #3D3D3D;
      font-size: clamp(38px, 7vw, 88px);
      font-weight: 600;
    }

    .about p,
    .wpc-info p {
      color: #6B6B6B;
      font-size: clamp(18px, 2.4vw, 30px);
      line-height: 1.5;
      word-break: keep-all;
    }

    .contact {
      background: #E7DDD1;
      flex-direction: column;
    }

    .contact a {
      color: #555;
      text-decoration: none;
      font-size: clamp(20px, 3vw, 32px);
    }

    @keyframes logoFadeIn {
      from {
        opacity: 0;
        transform: scale(1.03);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 768px) {
      .lang-switch {
        top: 16px;
        right: 16px;
      }

      .logo-hero {
        background-image: url("logo m.png"), url("logo.png");
        background-size: cover;
        background-position: center center;
      }

      .desktop-video {
        display: none;
      }

      .mobile-video {
        display: block;
      }

      section {
        padding: 40px 20px;
      }

      .video-only {
        padding: 0;
      }
    }
  </style>
</head>

<body>

  <div class="lang-switch">
    <button type="button" class="active" onclick="setLanguage('ko')">
      KOR
    </button>

    <button type="button" onclick="setLanguage('en')">
      ENG
    </button>
  </div>

  <section class="hero logo-hero"></section>

  <section class="video-only">
    <video
      class="bg-video desktop-video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      <source src="videos/16n9nxtn.MP4" type="video/mp4" />
    </video>

    <video
      class="bg-video mobile-video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      <source src="videos/1n1nxtn.MP4" type="video/mp4" />
    </video>
  </section>

  <section class="about fade-section">
    <div class="inner">
      <h2 data-ko="NXTN Company" data-en="NXTN Company">
        NXTN Company
      </h2>

      <p
        data-ko="NXTN은 신뢰, 기술, 시장에 대한 이해를 바탕으로 제조사와 파트너, 그리고 새로운 비즈니스 기회를 연결합니다."
        data-en="NXTN connects manufacturers, partners, and business opportunities through trust, technology, and market insight."
      >
        NXTN은 신뢰, 기술, 시장에 대한 이해를 바탕으로 제조사와 파트너,
        그리고 새로운 비즈니스 기회를 연결합니다.
      </p>
    </div>
  </section>

  <section class="wpc-info fade-section">
    <div class="inner">
      <h2 data-ko="WPC Deck" data-en="WPC Deck">
        WPC Deck
      </h2>

      <p
        data-ko="내구성과 디자인을 갖춘 현대적인 WPC 데크 솔루션을 야외 공간, 상업 시설, 건축 프로젝트에 제안합니다."
        data-en="We introduce durable and modern WPC decking solutions for outdoor spaces, commercial projects, and architectural applications."
      >
        내구성과 디자인을 갖춘 현대적인 WPC 데크 솔루션을 야외 공간,
        상업 시설, 건축 프로젝트에 제안합니다.
      </p>
    </div>
  </section>

  <section class="contact fade-section">
    <h2 data-ko="Contact" data-en="Contact">
      Contact
    </h2>

    <a href="mailto:sales@nxtn.co.kr">
      sales@nxtn.co.kr
    </a>
  </section>

  <script>
    function setLanguage(lang) {
      document.documentElement.lang = lang;

      document.querySelectorAll("[data-ko][data-en]").forEach(function (el) {
        el.textContent = el.dataset[lang];
      });

      document.querySelectorAll(".lang-switch button").forEach(function (btn) {
        btn.classList.remove("active");
      });

      if (lang === "ko") {
        document
          .querySelector(".lang-switch button:nth-child(1)")
          .classList.add("active");
      } else {
        document
          .querySelector(".lang-switch button:nth-child(2)")
          .classList.add("active");
      }
    }

    setLanguage("ko");

    const observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("show");
          }
        });
      },
      {
        threshold: 0.25
      }
    );

    document.querySelectorAll(".fade-section").forEach(function (section) {
      observer.observe(section);
    });

    function playVisibleVideo() {
      document.querySelectorAll(".bg-video").forEach(function (video) {
        const visible = window.getComputedStyle(video).display !== "none";

        if (visible) {
          video.play().catch(function () {});
        } else {
          video.pause();
        }
      });
    }

    window.addEventListener("load", playVisibleVideo);
    window.addEventListener("resize", playVisibleVideo);
    window.addEventListener("orientationchange", playVisibleVideo);
  </script>

</body>
</html>
